backend:
  name: github
  repo: samsunjack123/gy-tech-solutions
  branch: main
  auth_scope: repo
  base_url: https://gy-tech-oauth.samsunjack123.workers.dev
  auth_endpoint: /auth

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string" }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icon", name: "icon", widget: "string", default: "fas fa-tools" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string" }
