<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GY Tech Solutions CMS</title>
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css">
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        // Initialize Decap CMS
        CMS.init({
            config: {
                backend: {
                    name: "github",
                    repo: "YOUR_GITHUB_USERNAME/gy-tech-solutions",  // 🔁 CHANGE THIS
                    branch: "main",
                },
                media_folder: "public/images",
                public_folder: "/images",
                collections: [
                    {
                        name: "products",
                        label: "Products",
                        folder: "content/products",
                        create: true,
                        fields: [
                            { name: "title", label: "Title", widget: "string" },
                            { name: "description", label: "Description", widget: "text" },
                            { name: "price", label: "Price (e.g., GYD 18,000)", widget: "string" },
                            { name: "image", label: "Image URL", widget: "image" },
                            { name: "whatsapp", label: "WhatsApp Link", widget: "string", default: "https://wa.me/5921234567?text=I'm%20interested" }
                        ]
                    },
                    {
                        name: "services",
                        label: "Services",
                        folder: "content/services",
                        create: true,
                        fields: [
                            { name: "title", label: "Title", widget: "string" },
                            { name: "description", label: "Description", widget: "text" },
                            { name: "icon", label: "Icon (FontAwesome class)", widget: "string", default: "fas fa-tools" },
                            { name: "whatsapp", label: "WhatsApp Link", widget: "string" }
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>
